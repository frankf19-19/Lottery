# 彩研所 TWLottery Lab — 自動更新開獎資料
# BUILD_VERSION: v3.2.0
name: 更新開獎資料

on:
  schedule:
    # 開獎密集時段:台灣 20:35 起每 15 分鐘至 22:35(UTC 12:35–14:35)
    - cron: "35,50 12 * * *"
    - cron: "5,20,35,50 13 * * *"
    - cron: "5,20,35 14 * * *"
    # 白天保底:台灣 09:05 / 12:05 / 15:05 / 18:05(補官方事後修正)
    - cron: "5 1,4,7,10 * * *"
  workflow_dispatch: {}   # 允許在 Actions 頁面手動觸發

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 取出程式碼
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安裝套件
        run: pip install requests

      - name: 抓取最新開獎資料
        run: python scripts/update_data.py

      - name: 提交資料變更
        run: |
          git config user.name "twlottery-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/*.json
          if git diff --cached --quiet; then
            echo "資料無變更,不需提交。"
          else
            git commit -m "自動更新開獎資料 $(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M')"
            git push
          fi
